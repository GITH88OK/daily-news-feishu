name: 每日新闻推送到飞书

on:
  # ── 定时触发：北京时间每日 9:00 (UTC 1:00) ──
  schedule:
    - cron: '0 1 * * *'

  # ── 手动触发（用于测试） ──
  workflow_dispatch:

jobs:
  push-news:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 📥 拉取代码
        uses: actions/checkout@v4

      - name: 🐍 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 📰 获取新闻并推送到飞书
        env:
          TIANAPI_KEY: ${{ secrets.TIANAPI_KEY }}
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
        run: python src/main.py

      - name: ⚠️ 推送失败通知
        if: failure()
        run: |
          echo "::error::新闻推送失败! 请检查 API Key 或 Webhook URL 配置是否正确"
