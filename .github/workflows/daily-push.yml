name: 每日新闻推送到飞书

on:
  # ── GitHub 定时触发（内置，不够可靠） ──
  schedule:
    - cron: '0 1 * * *'       # 北京时间 9:00
    - cron: '30 1 * * *'      # 9:30 备用
    - cron: '0 2 * * *'       # 10:00 二次备用

  # ── 手动触发（测试用） ──
  workflow_dispatch:

  # ── 外部 cron 服务触发（最可靠） ──
  repository_dispatch:
    types: [daily-push]

jobs:
  push-news:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 📥 拉取代码
        uses: actions/checkout@v4

      - name: 🐍 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 📰 获取新闻并推送到飞书
        env:
          TIANAPI_KEY: ${{ secrets.TIANAPI_KEY }}
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
        run: python src/main.py

      - name: ⚠️ 推送失败通知
        if: failure()
        run: |
          echo "::error::新闻推送失败! 请检查 API Key 或 Webhook URL 配置是否正确"
